<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>쇼츠 이미지 자동생성 PC</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fb; color: #172033; }
    main { width: min(1080px, 100%); margin: 0 auto; padding: 18px; }
    h1 { margin: 0 0 8px; font-size: clamp(24px, 5vw, 34px); letter-spacing: 0; }
    p { margin: 0; color: #667085; line-height: 1.45; }
    section { background: #fff; border: 1px solid #d9e0ea; border-radius: 8px; padding: 14px; margin: 12px 0; }
    label { display: block; font-weight: 700; margin-bottom: 8px; }
    input, textarea, select { width: 100%; border: 1px solid #d9e0ea; border-radius: 8px; padding: 11px 12px; font: inherit; background: #fff; }
    textarea { min-height: 120px; resize: vertical; line-height: 1.45; }
    .source { min-height: 180px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    button { border: 1px solid transparent; border-radius: 8px; min-height: 42px; padding: 9px 13px; font: inherit; font-weight: 700; cursor: pointer; background: #0f766e; color: white; }
    button.secondary { background: #fff; color: #172033; border-color: #d9e0ea; }
    .row { display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .log { white-space: pre-wrap; background: #101828; color: #f9fafb; border-radius: 8px; padding: 12px; min-height: 150px; font-family: ui-monospace, Consolas, monospace; font-size: 12px; overflow: auto; }
    .option { display: flex; align-items: center; gap: 8px; color: #344054; font-weight: 600; }
    .option input { width: auto; }
    .status { color: #0f766e; font-weight: 700; margin-top: 10px; }
    .split-settings { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-top: 10px; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 12px; }
    .piece { border: 1px solid #d9e0ea; border-radius: 8px; padding: 8px; background: #f8fafc; }
    .piece img { width: 100%; display: block; border-radius: 6px; background: #e5e7eb; }
    .piece span { display: block; margin-top: 6px; font-size: 12px; color: #475467; }
    @media (max-width: 760px) {
      main { padding: 14px; }
      .grid, .split-settings { grid-template-columns: 1fr; }
      button { width: 100%; }
      .controls { display: grid; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>쇼츠 이미지 자동생성 PC</h1>
      <p>API 없이 PC Edge 브라우저에서 ChatGPT를 열고 프롬프트를 입력합니다. 이미 열려 있는 ChatGPT 탭이 연결되면 그 마지막 창에서 바로 시작합니다.</p>
    </header>

    <section>
      <label for="projectName">프로젝트명</label>
      <input id="projectName" value="shorts_project">
    </section>

    <section>
      <label for="sourceText">프롬프트 전체 붙여넣기</label>
      <textarea id="sourceText" class="source" placeholder="컷1: ...&#10;&#10;이미지2: ...&#10;&#10;Prompt3: ...&#10;&#10;최대 20개까지 가능합니다."></textarea>
      <div class="controls">
        <button id="splitBtn" type="button">프롬프트 1~20 자동 분리</button>
        <button id="checkBtn" class="secondary" type="button">ChatGPT 연결 확인</button>
        <button id="openBtn" class="secondary" type="button">ChatGPT 로그인/열기</button>
      </div>
      <p id="connectStatus" class="status">아직 연결 확인 전입니다.</p>
    </section>

    <section class="row">
      <div class="option">
        <input id="batchMode" type="checkbox">
        <label for="batchMode" style="margin:0;">전체 이미지를 한 번에 요청</label>
      </div>
      <div class="controls" style="margin:0;">
        <button id="runBtn" type="button">프로그램 실행</button>
        <button id="pathBtn" class="secondary" type="button">저장 위치 보기</button>
      </div>
    </section>

    <section class="grid" id="promptGrid"></section>

    <section>
      <div class="row">
        <strong>상태 로그</strong>
        <span id="runningText">대기 중</span>
      </div>
      <div id="log" class="log">아직 기록이 없습니다.</div>
    </section>

    <section>
      <div class="row">
        <div>
          <strong>이미지 분할 창</strong>
          <p>한 장 안에 여러 이미지가 붙어 있을 때 원본 픽셀 그대로 각각 PNG로 잘라 저장합니다.</p>
        </div>
      </div>
      <div class="split-settings">
        <div>
          <label for="splitImage">원본 이미지</label>
          <input id="splitImage" type="file" accept="image/*">
        </div>
        <div>
          <label for="splitCols">가로 칸</label>
          <input id="splitCols" type="number" min="1" max="20" value="5">
        </div>
        <div>
          <label for="splitRows">세로 줄</label>
          <input id="splitRows" type="number" min="1" max="20" value="2">
        </div>
        <div>
          <label for="splitGap">칸 사이 간격(px)</label>
          <input id="splitGap" type="number" min="0" max="200" value="0">
        </div>
      </div>
      <div class="split-settings">
        <div>
          <label for="splitMargin">바깥 여백(px)</label>
          <input id="splitMargin" type="number" min="0" max="500" value="0">
        </div>
        <div>
          <label for="splitPrefix">파일명 앞부분</label>
          <input id="splitPrefix" value="shorts_image">
        </div>
      </div>
      <div class="controls">
        <button id="previewSplitBtn" type="button">분할 미리보기</button>
        <button id="downloadSplitBtn" class="secondary" type="button">분할 이미지 저장</button>
      </div>
      <p id="splitStatus" class="status">원본 이미지를 선택하세요.</p>
      <div id="splitPreview" class="preview-grid"></div>
    </section>
  </main>

  <script>
    const maxPrompts = 20;
    const prompts = Array(maxPrompts).fill("");
    const $ = (id) => document.getElementById(id);
    const grid = $("promptGrid");
    let latestStatus = { running: false, paused: false, progressMessage: "대기 중" };
    let dotTick = 0;
    let splitPieces = [];

    function parsePrompts(raw) {
      const text = raw.replace(/\r/g, "").trim();
      if (!text) return [];
      const lines = text.split("\n");
      const blocks = [];
      let current = "";
      let activeBlock = false;
      const label = /^(?:#{1,6}\s*)?(?:컷|이미지|프롬프트|prompt|cut|image)\s*([1-9]|1[0-9]|20)\s*(?:[\).:\-]|번)?\s*(.*)$/i;
      const numberLabel = /^([1-9]|1[0-9]|20)\s*[\).:\-]\s*(.*)$/;
      const flush = () => {
        const value = current.trim();
        if (value) blocks.push(value);
        current = "";
        activeBlock = false;
      };
      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) {
          if (activeBlock && current) current += "\n";
          continue;
        }
        const match = line.match(label);
        const numberMatch = line.match(numberLabel);
        const isLabel = Boolean(match || numberMatch);
        if (isLabel) {
          flush();
          activeBlock = true;
          current = ((match && match[2]) || (numberMatch && numberMatch[2]) || "").trim();
        } else if (activeBlock) {
          current += (current.endsWith("\n") ? "" : "\n") + line;
        }
      }
      flush();
      if (blocks.length) return blocks.slice(0, maxPrompts);
      const paragraphs = text.split(/\n\s*\n/).map(v => v.trim()).filter(Boolean);
      if (paragraphs.length >= 2) return paragraphs.slice(0, maxPrompts);
      return lines.map(v => v.trim().replace(/^[-*]\s*/, "")).filter(v => v.length >= 8).slice(0, maxPrompts);
    }

    function render() {
      grid.innerHTML = "";
      prompts.forEach((prompt, index) => {
        const panel = document.createElement("section");
        panel.innerHTML = `
          <label for="prompt${index}">프롬프트 ${index + 1}</label>
          <textarea id="prompt${index}" data-index="${index}"></textarea>
        `;
        grid.appendChild(panel);
        panel.querySelector("textarea").value = prompt;
      });
      grid.querySelectorAll("textarea").forEach(area => {
        area.addEventListener("input", (event) => {
          prompts[Number(event.target.dataset.index)] = event.target.value;
        });
      });
    }

    async function post(url, body = {}) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || json.ok === false) throw new Error(json.error || "요청 실패");
      return json;
    }

    function loadSelectedImage() {
      const file = $("splitImage").files?.[0];
      if (!file) throw new Error("분할할 이미지를 먼저 선택하세요.");
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("이미지를 읽지 못했습니다."));
        img.src = URL.createObjectURL(file);
      });
    }

    async function buildSplitPieces() {
      const img = await loadSelectedImage();
      const cols = Math.max(1, Number($("splitCols").value || 1));
      const rows = Math.max(1, Number($("splitRows").value || 1));
      const gap = Math.max(0, Number($("splitGap").value || 0));
      const margin = Math.max(0, Number($("splitMargin").value || 0));
      const cropW = Math.floor((img.naturalWidth - margin * 2 - gap * (cols - 1)) / cols);
      const cropH = Math.floor((img.naturalHeight - margin * 2 - gap * (rows - 1)) / rows);
      if (cropW <= 0 || cropH <= 0) throw new Error("여백 또는 간격이 너무 큽니다.");

      const pieces = [];
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const canvas = document.createElement("canvas");
          canvas.width = cropW;
          canvas.height = cropH;
          const ctx = canvas.getContext("2d", { alpha: false });
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(
            img,
            margin + col * (cropW + gap),
            margin + row * (cropH + gap),
            cropW,
            cropH,
            0,
            0,
            cropW,
            cropH
          );
          pieces.push({
            index: pieces.length + 1,
            width: cropW,
            height: cropH,
            url: canvas.toDataURL("image/png")
          });
        }
      }
      return pieces;
    }

    async function previewSplit() {
      splitPieces = await buildSplitPieces();
      $("splitPreview").innerHTML = "";
      splitPieces.forEach(piece => {
        const item = document.createElement("div");
        item.className = "piece";
        item.innerHTML = `
          <img src="${piece.url}" alt="분할 이미지 ${piece.index}">
          <span>${String(piece.index).padStart(2, "0")}.png / ${piece.width}x${piece.height}</span>
        `;
        $("splitPreview").appendChild(item);
      });
      $("splitStatus").textContent = `${splitPieces.length}개 이미지로 분할했습니다. 원본 해상도 crop이라 품질을 낮추지 않습니다.`;
    }

    function downloadSplitPieces() {
      if (!splitPieces.length) throw new Error("먼저 분할 미리보기를 실행하세요.");
      const prefix = ($("splitPrefix").value || "shorts_image").replace(/[\\/:*?"<>|]/g, "_");
      splitPieces.forEach((piece, index) => {
        setTimeout(() => {
          const a = document.createElement("a");
          a.href = piece.url;
          a.download = `${prefix}_${String(piece.index).padStart(2, "0")}.png`;
          document.body.appendChild(a);
          a.click();
          a.remove();
        }, index * 250);
      });
    }

    $("splitBtn").addEventListener("click", () => {
      const parsed = parsePrompts($("sourceText").value);
      if (!parsed.length) {
        alert("프롬프트를 찾지 못했습니다.");
        return;
      }
      prompts.fill("");
      parsed.forEach((prompt, index) => prompts[index] = prompt);
      render();
    });

    $("checkBtn").addEventListener("click", async () => {
      try {
        const res = await fetch("/api/check-chatgpt");
        const json = await res.json();
        if (!res.ok || json.ok === false) throw new Error(json.error || "연결 확인 실패");
        $("connectStatus").textContent = `${json.message} ${json.usingCdp ? "(기존 Edge 연결)" : "(자동화용 Edge)"}`;
        if (json.connected) alert(`연결됨\n${json.title || "ChatGPT"}\n${json.url}`);
      } catch (error) {
        $("connectStatus").textContent = error.message;
        alert(error.message);
      }
    });

    $("openBtn").addEventListener("click", async () => {
      try {
        const json = await post("/api/open-chatgpt");
        $("connectStatus").textContent = `ChatGPT 열기 완료: ${json.url}`;
      } catch (error) {
        alert(error.message);
      }
    });

    $("runBtn").addEventListener("click", async () => {
      try {
        if (latestStatus.running && !latestStatus.paused) {
          await post("/api/pause");
        } else if (latestStatus.running && latestStatus.paused) {
          await post("/api/resume");
        } else {
          await post("/api/run", {
            projectName: $("projectName").value,
            prompts,
            batchMode: $("batchMode").checked
          });
        }
        await poll(true);
      } catch (error) {
        alert(error.message);
      }
    });

    $("pathBtn").addEventListener("click", async () => {
      const res = await fetch("/api/output-path");
      const json = await res.json();
      alert(`저장 위치:\n${json.outputRoot}`);
    });

    $("previewSplitBtn").addEventListener("click", async () => {
      try {
        await previewSplit();
      } catch (error) {
        $("splitStatus").textContent = error.message;
        alert(error.message);
      }
    });

    $("downloadSplitBtn").addEventListener("click", () => {
      try {
        downloadSplitPieces();
      } catch (error) {
        alert(error.message);
      }
    });

    function updateRunButton() {
      if (!latestStatus.running) {
        $("runBtn").textContent = "프로그램 실행";
      } else if (latestStatus.paused) {
        $("runBtn").textContent = "재시작";
      } else {
        $("runBtn").textContent = "일시 중지";
      }
    }

    async function poll(runOnce = false) {
      try {
        const res = await fetch("/api/status");
        const json = await res.json();
        latestStatus = json;
        updateRunButton();
        const dots = ".".repeat((dotTick++ % 4) + 1);
        const statusText = json.running
          ? (json.paused ? "일시 중지" : `진행 현황${dots}`)
          : "대기 중";
        $("runningText").textContent = statusText;
        const progressLine = json.running
          ? `${statusText} ${json.progressMessage || ""}`.trim()
          : json.progressMessage || "대기 중";
        $("log").textContent = json.log?.length
          ? `${progressLine}\n\n${json.log.join("\n")}`
          : `${progressLine}\n\n아직 기록이 없습니다.`;
      } catch {}
      if (!runOnce) setTimeout(poll, 700);
    }

    render();
    poll();
  </script>
</body>
</html>
